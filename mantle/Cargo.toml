[package]
name = "mantle"
version = "0.1.0"
edition = "2021"
description = "CoW-accelerated git worktree hydration"
license = "MIT"

[dependencies]
thiserror = "2"
libc = "0.2"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
gix = { version = "0.79", default-features = false, features = [
    "max-performance-safe",
    "worktree-mutation",
    "dirwalk",
    "status",
] }
git2 = { version = "0.20", default-features = false, features = [
    "vendored-libgit2",
    "ssh",
    "vendored-openssl",
] }
gix-ignore = "0.19"
bstr = "1.12"

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true

[lib]
name = "mantle"
