name: Trigger Release

on:
  push:
    tags:
      - "v*"

jobs:
  dispatch:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger CLI release in cuttlefish-releases
        run: |
          curl -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.RELEASE_DISPATCH_TOKEN }}" \
            https://api.github.com/repos/pieter-ouwerkerk/cuttlefish-releases/dispatches \
            -d '{"event_type":"cli-release","client_payload":{"tag":"${{ github.ref_name }}"}}'
